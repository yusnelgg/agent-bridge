<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Agent Bridge</title>
<style>
  :root {
    --bg: #0f172a;
    --card: #1e293b;
    --border: #334155;
    --text: #e2e8f0;
    --muted: #94a3b8;
    --primary: #6366f1;
    --accent: #22d3ee;
    --green: #4ade80;
    --red: #f87171;
    --yellow: #fbbf24;
  }
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
    background: var(--bg);
    color: var(--text);
    height: 100vh;
    display: flex;
    flex-direction: column;
  }
  .header {
    padding: 1rem 1.5rem;
    background: var(--card);
    border-bottom: 1px solid var(--border);
    display: flex;
    align-items: center;
    justify-content: space-between;
    flex-shrink: 0;
  }
  .header h1 { font-size: 1.1rem; font-weight: 700; }
  .header h1 span { color: var(--primary); }
  .status {
    display: flex;
    align-items: center;
    gap: 0.5rem;
    font-size: 0.8rem;
  }
  .dot {
    width: 8px; height: 8px;
    border-radius: 50%;
    background: var(--muted);
    display: inline-block;
  }
  .dot.online { background: var(--green); box-shadow: 0 0 6px var(--green); }
  .dot.offline { background: var(--red); }
  .dot.connecting { background: var(--yellow); animation: pulse 1s infinite; }
  @keyframes pulse { 50% { opacity: 0.4; } }
  .container {
    display: flex;
    flex: 1;
    overflow: hidden;
  }
  .sidebar-panel {
    width: 300px;
    background: var(--card);
    border-right: 1px solid var(--border);
    display: flex;
    flex-direction: column;
    flex-shrink: 0;
  }
  .main-panel {
    flex: 1;
    display: flex;
    flex-direction: column;
  }
  .panel-header {
    padding: 0.75rem 1rem;
    border-bottom: 1px solid var(--border);
    font-size: 0.8rem;
    font-weight: 600;
    text-transform: uppercase;
    letter-spacing: 0.05em;
    color: var(--muted);
    background: rgba(0,0,0,0.15);
  }
  .msg-list {
    flex: 1;
    overflow-y: auto;
    padding: 0.5rem;
  }
  .msg-item {
    padding: 0.6rem 0.75rem;
    border-radius: 6px;
    margin-bottom: 0.25rem;
    cursor: pointer;
    transition: background 0.15s;
    border-left: 3px solid transparent;
  }
  .msg-item:hover { background: rgba(99,102,241,0.08); }
  .msg-item.active {
    background: rgba(99,102,241,0.12);
    border-left-color: var(--primary);
  }
  .msg-item .from { font-weight: 600; font-size: 0.85rem; }
  .msg-item .preview { font-size: 0.78rem; color: var(--muted); white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
  .msg-item .time { font-size: 0.7rem; color: var(--muted); float: right; }
  .msg-item .badge-type {
    font-size: 0.65rem;
    padding: 0.1em 0.4em;
    border-radius: 4px;
    background: rgba(99,102,241,0.15);
    color: var(--primary);
    margin-left: 0.25rem;
  }
  .msg-item .badge-respond { background: rgba(74,222,128,0.15); color: var(--green); }
  .chat-area {
    flex: 1;
    display: flex;
    flex-direction: column;
  }
  .messages {
    flex: 1;
    overflow-y: auto;
    padding: 1rem;
    display: flex;
    flex-direction: column;
    gap: 0.5rem;
  }
  .bubble {
    max-width: 75%;
    padding: 0.7rem 1rem;
    border-radius: 12px;
    font-size: 0.9rem;
    line-height: 1.5;
    white-space: pre-wrap;
    word-break: break-word;
  }
  .bubble.incoming {
    align-self: flex-start;
    background: var(--card);
    border: 1px solid var(--border);
  }
  .bubble.outgoing {
    align-self: flex-end;
    background: rgba(99,102,241,0.2);
    border: 1px solid rgba(99,102,241,0.3);
  }
  .bubble .meta {
    font-size: 0.7rem;
    color: var(--muted);
    margin-bottom: 0.25rem;
  }
  .bubble .type-tag {
    font-size: 0.65rem;
    padding: 0.1em 0.4em;
    border-radius: 4px;
    background: rgba(99,102,241,0.15);
    color: var(--primary);
  }
  .empty-state {
    flex: 1;
    display: flex;
    align-items: center;
    justify-content: center;
    color: var(--muted);
    font-size: 0.9rem;
    text-align: center;
    padding: 2rem;
  }
  .input-area {
    padding: 0.75rem 1rem;
    border-top: 1px solid var(--border);
    background: var(--card);
    display: flex;
    gap: 0.5rem;
    flex-shrink: 0;
  }
  .input-area select, .input-area textarea, .input-area button {
    background: var(--bg);
    border: 1px solid var(--border);
    border-radius: 6px;
    color: var(--text);
    font-size: 0.85rem;
  }
  .input-area select {
    padding: 0.4rem;
    width: 100px;
  }
  .input-area textarea {
    flex: 1;
    padding: 0.5rem;
    resize: none;
    font-family: inherit;
    line-height: 1.4;
    min-height: 38px;
  }
  .input-area textarea:focus { outline: none; border-color: var(--primary); }
  .input-area button {
    padding: 0.4rem 1rem;
    background: var(--primary);
    color: white;
    font-weight: 600;
    cursor: pointer;
    transition: opacity 0.15s;
    border: none;
  }
  .input-area button:hover { opacity: 0.85; }
  .input-area button:disabled { opacity: 0.4; cursor: not-allowed; }
  .info-row {
    padding: 0.5rem 1rem;
    font-size: 0.78rem;
    color: var(--muted);
    border-bottom: 1px solid var(--border);
    display: flex;
    justify-content: space-between;
  }
  .info-row strong { color: var(--text); }
  ::-webkit-scrollbar { width: 6px; }
  ::-webkit-scrollbar-track { background: transparent; }
  ::-webkit-scrollbar-thumb { background: var(--border); border-radius: 3px; }
  @media (max-width: 700px) {
    .sidebar-panel { display: none; }
  }
</style>
</head>
<body>
<div class="header">
  <h1>⛁ <span>Agent</span>Bridge</h1>
  <div class="status">
    <span id="statusText">Conectando...</span>
    <span class="dot connecting" id="statusDot"></span>
  </div>
</div>
<div class="container">
  <div class="sidebar-panel">
    <div class="panel-header">Historial</div>
    <div class="info-row"><span>Identidad</span><strong id="identityLabel">—</strong></div>
    <div class="info-row"><span>Mensajes</span><strong id="msgCount">0</strong></div>
    <div class="msg-list" id="historyList"></div>
  </div>
  <div class="main-panel">
    <div class="panel-header">Mensajes en vivo</div>
    <div class="chat-area">
      <div class="messages" id="chatMessages">
        <div class="empty-state">Conectando al bridge...<br>esperá un momento</div>
      </div>
      <div class="input-area">
        <select id="targetSelect">
          <option value="">Destino...</option>
          <option value="frontend">frontend</option>
          <option value="backend">backend</option>
        </select>
        <textarea id="msgInput" rows="1" placeholder="Escribí un mensaje..." oninput="this.style.height='';this.style.height=Math.min(this.scrollHeight,120)+'px'"></textarea>
        <button id="sendBtn" onclick="sendMessage()">Enviar</button>
      </div>
    </div>
  </div>
</div>
<script>
const wsProto = location.protocol === 'https:' ? 'wss:' : 'ws:';
const wsURL = wsProto + '//' + location.host + '/ws';
let ws = null;
let identity = '—';
let allMessages = [];

function connectWS() {
  setStatus('Conectando...', 'connecting');

  ws = new WebSocket(wsURL);
  ws.onopen = () => {
    setStatus('Conectado', 'online');
    loadHistory();
  };
  ws.onmessage = (e) => {
    try {
      const msg = JSON.parse(e.data);
      addLiveMessage(msg);
      allMessages.unshift(msg);
      updateHistory();
    } catch(_) {}
  };
  ws.onclose = () => {
    setStatus('Desconectado', 'offline');
    setTimeout(connectWS, 2000);
  };
  ws.onerror = () => ws.close();
}

function setStatus(text, cls) {
  document.getElementById('statusText').textContent = text;
  const dot = document.getElementById('statusDot');
  dot.className = 'dot ' + cls;
}

async function loadHistory() {
  try {
    const resp = await fetch('/messages/all');
    const data = await resp.json();
    identity = data.identity || '—';
    allMessages = data.messages || [];
    document.getElementById('identityLabel').textContent = identity;
    updateHistory();
    document.getElementById('msgCount').textContent = allMessages.length;

    const sel = document.getElementById('targetSelect');
    const others = [...new Set(allMessages.map(m => m.from === identity ? m.to : m.from).filter(x => x !== identity))];
    others.forEach(o => { if (![...sel.options].find(opt => opt.value === o)) { const opt = document.createElement('option'); opt.value = o; opt.textContent = o; sel.appendChild(opt); } });

    if (allMessages.length === 0) {
      document.getElementById('chatMessages').innerHTML = '<div class="empty-state">Sin mensajes todavía.<br>Envíá uno desde el formulario o desde la terminal.</div>';
    } else {
      document.getElementById('chatMessages').innerHTML = '';
      allMessages.slice().reverse().forEach(m => addLiveMessage(m));
    }
  } catch(e) {
    document.getElementById('chatMessages').innerHTML = '<div class="empty-state">Error cargando historial. ¿El bridge está corriendo?</div>';
  }
}

function addLiveMessage(msg) {
  const container = document.getElementById('chatMessages');
  const empty = container.querySelector('.empty-state');
  if (empty) container.innerHTML = '';

  const isOutgoing = msg.from === identity;
  const div = document.createElement('div');
  div.className = 'bubble ' + (isOutgoing ? 'outgoing' : 'incoming');

  const time = msg.created_at ? new Date(msg.created_at).toLocaleTimeString() : '';
  const typeLabel = msg.type === 'respond' ? 'respuesta' : msg.type === 'ask' ? 'pregunta' : msg.type === 'task_result' ? 'resultado' : msg.type;

  div.innerHTML = `<div class="meta">${isOutgoing ? '→ ' + msg.to : msg.from + ' →'} <span class="type-tag">${typeLabel}</span> · ${time}</div>${escHtml(msg.content)}`;
  container.appendChild(div);
  container.scrollTop = container.scrollHeight;
}

function updateHistory() {
  const list = document.getElementById('historyList');
  list.innerHTML = allMessages.slice(0, 100).map(m => {
    const time = m.created_at ? new Date(m.created_at).toLocaleTimeString() : '';
    const typeBadge = m.type === 'respond' ? 'badge-respond' : '';
    return `<div class="msg-item" onclick="showMessage('${m.id}')">
      <span class="time">${time}</span>
      <span class="from">${escHtml(m.from)} → ${escHtml(m.to)}</span>
      <span class="badge-type ${typeBadge}">${m.type}</span>
      <div class="preview">${escHtml(m.content.substring(0, 80))}</div>
    </div>`;
  }).join('');
}

function showMessage(id) {
  const msg = allMessages.find(m => m.id === id);
  if (!msg) return;
  const container = document.getElementById('chatMessages');
  container.innerHTML = '';
  addLiveMessage(msg);

  document.querySelectorAll('.msg-item').forEach(el => el.classList.remove('active'));
  const idx = [...document.querySelectorAll('.msg-item')].findIndex(el => el.textContent.includes(id));
  // highlight not trivial, skip for now
}

async function sendMessage() {
  const to = document.getElementById('targetSelect').value;
  const content = document.getElementById('msgInput').value.trim();
  if (!to || !content) return;

  const btn = document.getElementById('sendBtn');
  btn.disabled = true;
  btn.textContent = 'Enviando...';

  try {
    await fetch('/messages/send', {
      method: 'POST',
      headers: {'Content-Type': 'application/json'},
      body: JSON.stringify({to, type: 'ask', content})
    });
    document.getElementById('msgInput').value = '';
    document.getElementById('msgInput').style.height = '';
  } catch(e) {
    alert('Error al enviar: ' + e.message);
  }

  btn.disabled = false;
  btn.textContent = 'Enviar';
}

function escHtml(s) {
  const d = document.createElement('div');
  d.textContent = s;
  return d.innerHTML;
}

// Enter to send (Shift+Enter for new line)
document.addEventListener('keydown', (e) => {
  if (e.key === 'Enter' && !e.shiftKey) {
    const input = document.getElementById('msgInput');
    if (document.activeElement === input) {
      e.preventDefault();
      sendMessage();
    }
  }
});

connectWS();
</script>
</body>
</html>
